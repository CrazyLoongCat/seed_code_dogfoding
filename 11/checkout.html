<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>确认订单 | LUXE</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=USD"></script>
    <style>
        .checkout-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
        }

        .checkout-section {
            background: var(--white);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: var(--shadow-sm);
        }

        .checkout-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .order-summary {
            position: sticky;
            top: 100px;
        }

        .order-items {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 1.5rem;
        }

        .order-item {
            display: flex;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-item img {
            width: 60px;
            height: 75px;
            object-fit: cover;
            border-radius: 6px;
        }

        .order-item-info {
            flex: 1;
        }

        .order-item-name {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        .order-item-size {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 0.25rem;
        }

        .order-item-qty {
            font-size: 0.8rem;
            color: var(--text-light);
        }

        .order-item-price {
            font-weight: 600;
            color: var(--accent-color);
        }

        .summary-details {
            background: var(--bg-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
        }

        .summary-row:last-child {
            margin-bottom: 0;
        }

        .summary-row.total {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-color);
            padding-top: 0.75rem;
            border-top: 1px solid var(--border-color);
            margin-top: 0.75rem;
        }

        .payment-methods {
            margin-top: 1.5rem;
        }

        .payment-option {
            display: flex;
            align-items: center;
            padding: 1rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .payment-option:hover {
            border-color: var(--accent-color);
        }

        .payment-option.active {
            border-color: var(--accent-color);
            background: rgba(233, 69, 96, 0.05);
        }

        .payment-option input[type="radio"] {
            margin-right: 1rem;
        }

        .payment-option label {
            flex: 1;
            cursor: pointer;
            font-weight: 500;
        }

        .payment-option .payment-icon {
            height: 24px;
        }

        .paypal-button-container {
            margin-top: 1.5rem;
        }

        .card-form {
            margin-top: 1rem;
            padding: 1.5rem;
            background: var(--bg-color);
            border-radius: 8px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            transition: var(--transition);
        }

        .back-btn:hover {
            color: var(--accent-color);
        }

        @media (max-width: 768px) {
            .checkout-container {
                grid-template-columns: 1fr;
                padding: 1rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .order-summary {
                position: static;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">LUXE</a>
            <nav class="nav">
                <a href="#">新品</a>
                <a href="#">女装</a>
                <a href="#">配饰</a>
                <a href="#">特惠</a>
            </nav>
            <div class="header-actions">
                <div class="currency-switcher">
                    <select id="currencySelect">
                        <option value="USD">USD $</option>
                        <option value="EUR">EUR €</option>
                        <option value="GBP">GBP £</option>
                    </select>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <a href="index.html" class="back-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"></path>
            </svg>
            返回购物
        </a>

        <div class="checkout-container">
            <div>
                <div class="checkout-section">
                    <h2 class="checkout-title">收货地址</h2>
                    <form id="shippingForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="firstName">名字</label>
                                <input type="text" id="firstName" placeholder="请输入名字" required>
                            </div>
                            <div class="form-group">
                                <label for="lastName">姓氏</label>
                                <input type="text" id="lastName" placeholder="请输入姓氏" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="email">电子邮箱</label>
                            <input type="email" id="email" placeholder="your@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">联系电话</label>
                            <input type="tel" id="phone" placeholder="请输入电话号码" required>
                        </div>
                        <div class="form-group">
                            <label for="address">详细地址</label>
                            <input type="text" id="address" placeholder="街道、门牌号等" required>
                        </div>
                        <div class="form-group">
                            <label for="address2">地址2 (可选)</label>
                            <input type="text" id="address2" placeholder="公寓、套房、单元等">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="city">城市</label>
                                <input type="text" id="city" placeholder="请输入城市" required>
                            </div>
                            <div class="form-group">
                                <label for="state">州/省</label>
                                <input type="text" id="state" placeholder="请输入州/省" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="zipCode">邮政编码</label>
                                <input type="text" id="zipCode" placeholder="请输入邮编" required>
                            </div>
                            <div class="form-group">
                                <label for="country">国家</label>
                                <select id="country" required>
                                    <option value="US">美国</option>
                                    <option value="CA">加拿大</option>
                                    <option value="UK">英国</option>
                                    <option value="CN">中国</option>
                                    <option value="OTHER">其他</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="checkout-section" style="margin-top: 2rem;">
                    <h2 class="checkout-title">支付方式</h2>
                    <div class="payment-methods">
                        <div class="payment-option active">
                            <input type="radio" id="paypal" name="paymentMethod" value="paypal" checked>
                            <label for="paypal">PayPal</label>
                            <svg class="payment-icon" width="80" height="24" viewBox="0 0 116 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M24.361 5.531h-5.442l-1.484 9.23h3.908l.331-2.133h1.599c2.617 0 4.088-1.088 4.088-3.555 0-2.516-1.663-3.542-2.999-3.542zm-.758 4.922h-1.379l.483-3.17h1.269c.924 0 1.732.352 1.732 1.585 0 1.021-.561 1.585-2.105 1.585z" fill="#003087"/>
                                <path d="M38.642 14.761c.959-.557 1.501-1.393 1.501-2.629 0-1.754-1.184-2.977-3.326-2.977h-4.372l-1.484 9.23h3.248l.331-2.133h1.445c2.197 0 3.448-1.037 4.131-2.182l.526-3.037h-2.025l-.232 1.382h-3.394l.774-4.837h2.894c1.163 0 1.821.364 1.821 1.372 0 .716-.221 1.164-.793 1.524l-.058.038c.631.25 1.032.806 1.032 1.71 0 1.099-.642 1.74-1.707 1.997l.001.002z" fill="#003087"/>
                                <path d="M50.293 5.531h-3.687l-2.794 9.23h2.418l.521-1.82h3.127l.521 1.82h2.418l-2.794-9.23zm-1.764 5.062l1.021-3.572 1.021 3.572h-2.042z" fill="#003087"/>
                                <path d="M56.65 5.531h2.874l-1.437 9.23h-2.874l1.437-9.23z" fill="#003087"/>
                                <path d="M67.963 10.514c0-3.15-2.155-4.983-5.478-4.983h-4.915l-1.484 9.23h4.625l.165-1.072h.118c.591.932 1.708 1.663 3.427 1.663 3.371 0 5.659-2.08 5.659-4.84l-.002-.002zm-4.774 3.659h-2.307l.568-3.708h2.307c.939 0 1.521.376 1.521 1.265 0 .674-.323 1.14-1.174 1.636l.085.007c1.026.247 1.632.864 1.632 1.947 0 1.325-.953 2.14-2.586 2.14-1.272 0-2.087-.504-2.511-1.087l-.001.001z" fill="#003087"/>
                                <path d="M79.366 5.531h-3.687l-2.794 9.23h2.418l.521-1.82h3.127l.521 1.82h2.418l-2.794-9.23zm-1.764 5.062l1.021-3.572 1.021 3.572h-2.042z" fill="#003087"/>
                                <path d="M85.889 5.531h2.874l-1.437 9.23h-2.874l1.437-9.23z" fill="#003087"/>
                                <path d="M100.18 5.531h-5.442l-1.484 9.23h3.908l.331-2.133h1.599c2.617 0 4.088-1.088 4.088-3.555 0-2.516-1.663-3.542-2.999-3.542zm-.758 4.922h-1.379l.483-3.17h1.269c.924 0 1.732.352 1.732 1.585 0 1.021-.561 1.585-2.105 1.585z" fill="#003087"/>
                                <path d="M108.329 5.531h-2.863l-2.546 9.23h2.406l.492-1.82h2.919l.492 1.82h2.614l-1.52-4.811 1.811-4.419h-2.815l-.995 2.947-.585-2.947h.002z" fill="#003087"/>
                            </svg>
                        </div>
                        <div class="payment-option">
                            <input type="radio" id="card" name="paymentMethod" value="card">
                            <label for="card">信用卡/借记卡</label>
                            <svg class="payment-icon" width="40" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                                <line x1="1" y1="10" x2="23" y2="10"></line>
                            </svg>
                        </div>
                    </div>

                    <div class="card-form" id="cardForm" style="display: none;">
                        <div class="form-group">
                            <label for="cardNumber">卡号</label>
                            <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="expiry">有效期</label>
                                <input type="text" id="expiry" placeholder="MM/YY" maxlength="5">
                            </div>
                            <div class="form-group">
                                <label for="cvv">CVV</label>
                                <input type="text" id="cvv" placeholder="123" maxlength="3">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="cardName">持卡人姓名</label>
                            <input type="text" id="cardName" placeholder="请输入持卡人姓名">
                        </div>
                    </div>

                    <div class="paypal-button-container" id="paypal-button-container"></div>
                    
                    <button class="checkout-btn" id="placeOrderBtn" style="width: 100%; margin-top: 1.5rem;">
                        确认支付
                    </button>
                </div>
            </div>

            <div class="checkout-section order-summary">
                <h2 class="checkout-title">订单摘要</h2>
                <div class="order-items" id="orderItems"></div>
                <div class="summary-details">
                    <div class="summary-row">
                        <span>商品小计</span>
                        <span id="subtotal">$0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>运费</span>
                        <span id="shipping">$0.00</span>
                    </div>
                    <div class="summary-row" id="discountRow" style="display: none;">
                        <span>优惠折扣</span>
                        <span id="discount">-$0.00</span>
                    </div>
                    <div class="summary-row total">
                        <span>总计</span>
                        <span id="total">$0.00</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const cart = JSON.parse(localStorage.getItem('luxe_cart') || '[]');
            const currency = localStorage.getItem('luxe_currency') || 'USD';
            const promo = localStorage.getItem('luxe_promo') || '';
            const country = localStorage.getItem('luxe_country') || 'US';

            if (cart.length === 0) {
                window.location.href = 'index.html';
                return;
            }

            const EXCHANGE_RATES = { USD: 1, EUR: 0.92, GBP: 0.78 };
            const CURRENCY_SYMBOLS = { USD: '$', EUR: '€', GBP: '£' };
            const SHIPPING_RATES = { US: 10, CA: 15, UK: 20, OTHER: 25 };
            const PROMO_CODES = {
                SAVE10: { type: 'percentage', value: 0.1, maxDiscount: 30, description: '减10%' },
                FREEship: { type: 'shipping', description: '免运费' }
            };

            function formatPrice(usdAmount) {
                const converted = usdAmount * EXCHANGE_RATES[currency];
                const symbol = CURRENCY_SYMBOLS[currency];
                return `${symbol}${converted.toFixed(2)}`;
            }

            function calculateSubtotal() {
                return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            }

            function calculateShipping() {
                return SHIPPING_RATES[country] || 0;
            }

            function calculateDiscount() {
                if (!promo) return 0;
                const promoCode = PROMO_CODES[promo];
                if (!promoCode) return 0;
                
                if (promoCode.type === 'percentage') {
                    const discount = calculateSubtotal() * promoCode.value;
                    return Math.min(discount, promoCode.maxDiscount);
                } else if (promoCode.type === 'shipping') {
                    return calculateShipping();
                }
                return 0;
            }

            function calculateTotal() {
                return Math.max(0, calculateSubtotal() + calculateShipping() - calculateDiscount());
            }

            function renderOrderItems() {
                const container = document.getElementById('orderItems');
                container.innerHTML = cart.map(item => `
                    <div class="order-item">
                        <img src="${item.image}" alt="${item.name}">
                        <div class="order-item-info">
                            <div class="order-item-name">${item.name}</div>
                            <div class="order-item-size">尺码: ${item.size}</div>
                            <div class="order-item-qty">数量: ${item.quantity}</div>
                        </div>
                        <div class="order-item-price">${formatPrice(item.price * item.quantity)}</div>
                    </div>
                `).join('');
            }

            function updateSummary() {
                document.getElementById('subtotal').textContent = formatPrice(calculateSubtotal());
                document.getElementById('shipping').textContent = formatPrice(calculateShipping());
                
                const discount = calculateDiscount();
                if (discount > 0) {
                    document.getElementById('discountRow').style.display = 'flex';
                    document.getElementById('discount').textContent = `-${formatPrice(discount)}`;
                }
                
                document.getElementById('total').textContent = formatPrice(calculateTotal());
            }

            renderOrderItems();
            updateSummary();

            document.getElementById('currencySelect').value = currency;
            document.getElementById('currencySelect').addEventListener('change', function(e) {
                localStorage.setItem('luxe_currency', e.target.value);
                window.location.reload();
            });

            document.querySelectorAll('input[name="paymentMethod"]').forEach(radio => {
                radio.addEventListener('change', function() {
                    document.querySelectorAll('.payment-option').forEach(opt => opt.classList.remove('active'));
                    this.closest('.payment-option').classList.add('active');
                    
                    const cardForm = document.getElementById('cardForm');
                    const paypalContainer = document.getElementById('paypal-button-container');
                    
                    if (this.value === 'card') {
                        cardForm.style.display = 'block';
                        paypalContainer.style.display = 'none';
                    } else {
                        cardForm.style.display = 'none';
                        paypalContainer.style.display = 'block';
                    }
                });
            });

            document.getElementById('cardNumber').addEventListener('input', function(e) {
                let value = e.target.value.replace(/\s/g, '');
                value = value.match(/.{1,4}/g)?.join(' ') || value;
                e.target.value = value;
            });

            document.getElementById('expiry').addEventListener('input', function(e) {
                let value = e.target.value.replace(/\D/g, '');
                if (value.length >= 2) {
                    value = value.slice(0, 2) + '/' + value.slice(2, 4);
                }
                e.target.value = value;
            });

            function saveOrder(paymentMethod) {
                const order = {
                    id: 'ORD' + Date.now(),
                    date: new Date().toISOString(),
                    items: cart,
                    subtotal: calculateSubtotal(),
                    shipping: calculateShipping(),
                    discount: calculateDiscount(),
                    total: calculateTotal(),
                    currency: currency,
                    paymentMethod: paymentMethod,
                    shippingInfo: {
                        firstName: document.getElementById('firstName').value,
                        lastName: document.getElementById('lastName').value,
                        email: document.getElementById('email').value,
                        phone: document.getElementById('phone').value,
                        address: document.getElementById('address').value,
                        address2: document.getElementById('address2').value,
                        city: document.getElementById('city').value,
                        state: document.getElementById('state').value,
                        zipCode: document.getElementById('zipCode').value,
                        country: document.getElementById('country').value
                    },
                    status: 'paid'
                };

                const orders = JSON.parse(localStorage.getItem('luxe_orders') || '[]');
                orders.unshift(order);
                localStorage.setItem('luxe_orders', JSON.stringify(orders));

                localStorage.removeItem('luxe_cart');
                localStorage.removeItem('luxe_promo');

                return order.id;
            }

            document.getElementById('placeOrderBtn').addEventListener('click', function() {
                const form = document.getElementById('shippingForm');
                if (!form.checkValidity()) {
                    form.reportValidity();
                    return;
                }

                const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked').value;
                
                if (paymentMethod === 'card') {
                    const cardNumber = document.getElementById('cardNumber').value;
                    const expiry = document.getElementById('expiry').value;
                    const cvv = document.getElementById('cvv').value;
                    const cardName = document.getElementById('cardName').value;

                    if (!cardNumber || !expiry || !cvv || !cardName) {
                        alert('请填写完整的信用卡信息');
                        return;
                    }
                }

                const orderId = saveOrder(paymentMethod);
                window.location.href = `success.html?orderId=${orderId}`;
            });

            if (window.paypal) {
                paypal.Buttons({
                    createOrder: function(data, actions) {
                        const form = document.getElementById('shippingForm');
                        if (!form.checkValidity()) {
                            form.reportValidity();
                            return;
                        }
                        return actions.order.create({
                            purchase_units: [{
                                amount: {
                                    value: calculateTotal().toFixed(2)
                                }
                            }]
                        });
                    },
                    onApprove: function(data, actions) {
                        return actions.order.capture().then(function(details) {
                            const orderId = saveOrder('paypal');
                            window.location.href = `success.html?orderId=${orderId}`;
                        });
                    },
                    onError: function(err) {
                        alert('支付失败，请重试');
                    }
                }).render('#paypal-button-container');
            }
        });
    </script>
</body>
</html>
