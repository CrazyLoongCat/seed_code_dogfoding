<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付成功 | LUXE</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        .success-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 2rem;
            text-align: center;
        }

        .success-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem;
            background: var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: scaleIn 0.5s ease-out;
        }

        .success-icon svg {
            width: 50px;
            height: 50px;
            color: var(--white);
            stroke-width: 3;
        }

        @keyframes scaleIn {
            0% {
                transform: scale(0);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        .success-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .success-message {
            font-size: 1.125rem;
            color: var(--text-light);
            margin-bottom: 2rem;
        }

        .order-details {
            background: var(--white);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: var(--shadow-sm);
            margin: 2rem 0;
            text-align: left;
        }

        .order-details-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .order-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .order-info-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .order-info-label {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .order-info-value {
            font-weight: 500;
            color: var(--primary-color);
        }

        .order-items {
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
        }

        .order-item {
            display: flex;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid var(--bg-color);
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-item img {
            width: 60px;
            height: 75px;
            object-fit: cover;
            border-radius: 6px;
        }

        .order-item-info {
            flex: 1;
        }

        .order-item-name {
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        .order-item-size {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 0.25rem;
        }

        .order-item-qty {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .order-item-price {
            font-weight: 600;
            color: var(--accent-color);
        }

        .order-summary {
            background: var(--bg-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 1.5rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
        }

        .summary-row:last-child {
            margin-bottom: 0;
        }

        .summary-row.total {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-color);
            padding-top: 0.75rem;
            border-top: 1px solid var(--border-color);
            margin-top: 0.75rem;
        }

        .shipping-address {
            background: var(--bg-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 1.5rem;
        }

        .shipping-address h4 {
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 0.75rem;
        }

        .shipping-address p {
            font-size: 0.95rem;
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--accent-color);
            color: var(--white);
        }

        .btn-primary:hover {
            background: #d63850;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--white);
            color: var(--primary-color);
            border: 2px solid var(--border-color);
        }

        .btn-secondary:hover {
            border-color: var(--primary-color);
        }

        @media (max-width: 768px) {
            .success-container {
                padding: 2rem 1rem;
            }

            .success-title {
                font-size: 1.75rem;
            }

            .order-info {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">LUXE</a>
            <nav class="nav">
                <a href="#">新品</a>
                <a href="#">女装</a>
                <a href="#">配饰</a>
                <a href="#">特惠</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="success-container">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            
            <h1 class="success-title">支付成功！</h1>
            <p class="success-message">感谢您的购买，我们将尽快为您发货</p>

            <div class="order-details">
                <h2 class="order-details-title">订单详情</h2>
                
                <div class="order-info">
                    <div class="order-info-item">
                        <span class="order-info-label">订单编号</span>
                        <span class="order-info-value" id="orderId">-</span>
                    </div>
                    <div class="order-info-item">
                        <span class="order-info-label">支付方式</span>
                        <span class="order-info-value" id="paymentMethod">-</span>
                    </div>
                    <div class="order-info-item">
                        <span class="order-info-label">下单时间</span>
                        <span class="order-info-value" id="orderDate">-</span>
                    </div>
                    <div class="order-info-item">
                        <span class="order-info-label">订单状态</span>
                        <span class="order-info-value" style="color: var(--success);">已支付</span>
                    </div>
                </div>

                <div class="order-items" id="orderItems"></div>

                <div class="order-summary" id="orderSummary"></div>

                <div class="shipping-address">
                    <h4>收货地址</h4>
                    <p id="shippingAddress">-</p>
                </div>
            </div>

            <div class="action-buttons">
                <a href="index.html" class="btn btn-secondary">继续购物</a>
                <a href="#" class="btn btn-primary">查看订单</a>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            const orderId = params.get('orderId');
            
            if (!orderId) {
                window.location.href = 'index.html';
                return;
            }

            const orders = JSON.parse(localStorage.getItem('luxe_orders') || '[]');
            const order = orders.find(o => o.id === orderId);

            if (!order) {
                window.location.href = 'index.html';
                return;
            }

            const EXCHANGE_RATES = { USD: 1, EUR: 0.92, GBP: 0.78 };
            const CURRENCY_SYMBOLS = { USD: '$', EUR: '€', GBP: '£' };

            function formatPrice(usdAmount) {
                const converted = usdAmount * EXCHANGE_RATES[order.currency];
                const symbol = CURRENCY_SYMBOLS[order.currency];
                return `${symbol}${converted.toFixed(2)}`;
            }

            document.getElementById('orderId').textContent = order.id;
            
            const paymentMethodText = {
                'paypal': 'PayPal',
                'card': '信用卡/借记卡'
            };
            document.getElementById('paymentMethod').textContent = paymentMethodText[order.paymentMethod] || order.paymentMethod;

            const orderDate = new Date(order.date);
            document.getElementById('orderDate').textContent = orderDate.toLocaleString('zh-CN');

            const orderItemsContainer = document.getElementById('orderItems');
            orderItemsContainer.innerHTML = order.items.map(item => `
                <div class="order-item">
                    <img src="${item.image}" alt="${item.name}">
                    <div class="order-item-info">
                        <div class="order-item-name">${item.name}</div>
                        <div class="order-item-size">尺码: ${item.size}</div>
                        <div class="order-item-qty">数量: ${item.quantity}</div>
                    </div>
                    <div class="order-item-price">${formatPrice(item.price * item.quantity)}</div>
                </div>
            `).join('');

            const summaryContainer = document.getElementById('orderSummary');
            let summaryHTML = `
                <div class="summary-row">
                    <span>商品小计</span>
                    <span>${formatPrice(order.subtotal)}</span>
                </div>
                <div class="summary-row">
                    <span>运费</span>
                    <span>${formatPrice(order.shipping)}</span>
                </div>
            `;

            if (order.discount > 0) {
                summaryHTML += `
                    <div class="summary-row">
                        <span>优惠折扣</span>
                        <span style="color: var(--success);">-${formatPrice(order.discount)}</span>
                    </div>
                `;
            }

            summaryHTML += `
                <div class="summary-row total">
                    <span>总计</span>
                    <span>${formatPrice(order.total)}</span>
                </div>
            `;
            summaryContainer.innerHTML = summaryHTML;

            const addr = order.shippingInfo;
            const addressHTML = `
                ${addr.firstName} ${addr.lastName}<br>
                ${addr.address}${addr.address2 ? ', ' + addr.address2 : ''}<br>
                ${addr.city}, ${addr.state} ${addr.zipCode}<br>
                ${addr.country}<br>
                ${addr.phone}<br>
                ${addr.email}
            `;
            document.getElementById('shippingAddress').innerHTML = addressHTML;
        });
    </script>
</body>
</html>
